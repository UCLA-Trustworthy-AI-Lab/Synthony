name: CICD

on:
  push:
    branches: [main, develop, cr-revision-1]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Unit + Integration + pytest-based
  #         functional tests (no live server needed)
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,cli]"
          pip install mcp pytest-asyncio openai requests

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Run functional tests (pytest-based, no live server)
        run: |
          pytest tests/functional/ -v --tb=short \
            --ignore=tests/functional/test_api_advanced.py \
            --ignore=tests/functional/test_llm_with_systemprompt.py \
            --ignore=tests/functional/test_api_simple.py \
            --ignore=tests/functional/test_openai_connection.py \
            --ignore=tests/functional/test_recommender_benchmark.py

      - name: Run MCP server tests
        run: |
          cd mcp_server
          pytest test_server.py test_protocol.py -v --tb=short

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            tests/data/
            .pytest_cache/

  # ──────────────────────────────────────────────
  # Job 2: Build Docker image + run live-server
  #         functional script tests against it
  # ──────────────────────────────────────────────
  docker-functional-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: synthony:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build test-runner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.test
          load: true
          push: false
          tags: synthony-test:ci

      - name: Start API container
        run: |
          docker run -d \
            --name synthony-api \
            -p 8000:8000 \
            synthony:ci
          echo "Waiting for API to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is up!"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health || (docker logs synthony-api && exit 1)

      - name: Run live-server functional tests (rule_based only, no LLM key needed)
        run: |
          docker run --rm \
            --network host \
            -e SYNTHONY_API_URL=http://localhost:8000 \
            -e SYNTHONY_DATA_DIR=/app/dataset/input_data \
            synthony-test:ci \
            python tests/functional/test_api_advanced.py
        continue-on-error: true # LLM-dependent scenarios may fail without API key

      - name: Show API logs on failure
        if: failure()
        run: docker logs synthony-api

      - name: Stop API container
        if: always()
        run: docker rm -f synthony-api || true

  # ──────────────────────────────────────────────
  # Job 3: Production build validation
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: synthony:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image health
        run: |
          docker run --rm -d --name test-api -p 8000:8000 synthony:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
