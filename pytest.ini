[pytest]
# Pytest configuration for Synthony project

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers
markers =
    unit: Unit tests for individual components
    functional: Functional tests for API workflows
    integration: Integration tests for end-to-end scenarios
    regression: Regression tests for baseline expectations
    slow: Tests that take longer to run
    requires_llm: Tests that require LLM API access

# Coverage options (when using pytest-cov)
[coverage:run]
source = synthony
omit =
    */tests/*
    */conftest.py
    */__pycache__/*

[coverage:report]
precision = 2
skip_covered = False
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
